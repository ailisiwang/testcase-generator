version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: testcase-postgres
    environment:
      POSTGRES_DB: testcase
      POSTGRES_USER: testcase
      POSTGRES_PASSWORD: testcase123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testcase"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testcase-backend
    environment:
      - DATABASE_URL=postgresql://testcase:testcase123@postgres:5432/testcase
      - SECRET_KEY=your-secret-key-change-in-production-please-use-env
      - ENCRYPTION_KEY=your-encryption-key-change-in-production
      - DEBUG=true
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
